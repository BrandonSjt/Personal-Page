  <text x="600" y="650" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="220" font-weight="800" fill="#eef4ff" letter-spacing="-10">BD</text>
  <text x="600" y="760" text-anchor="middle" font-family="Consolas, monospace" font-size="34" fill="#47f0ff" letter-spacing="8">PROFILE PHOTO</text>
