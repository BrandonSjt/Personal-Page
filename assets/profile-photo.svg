<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Brandon Deandra profile placeholder</title>
  <desc id="desc">A dark AI lab style placeholder with the initials BD.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101f"/>
      <stop offset="0.55" stop-color="#11193a"/>
      <stop offset="1" stop-color="#050711"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="50%">
      <stop offset="0" stop-color="#47f0ff" stop-opacity="0.32"/>
